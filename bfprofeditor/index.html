<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=.8">
        <title>BFPROFEditor</title>


      <script type="module" crossorigin src="/src/bfprofeditor/index.js"></script>
      <link rel="modulepreload" crossorigin href="/src/modulepreload-polyfill.js">
      <link rel="modulepreload" crossorigin href="/src/preload-helper.js">
      <link rel="stylesheet" crossorigin href="/style/index.css">
    </head>


    <body>
        <div id="sidenav" hide>
            <div class="menu-category-container">
                <div class="menu-category">
                    <div class="menu-category-title" i18n="sidenav.upload._title"></div>
                    <button class="menu-btn" btn-action="prof-load">
                        <div class="display" i18n="sidenav.upload.browse"></div>
                        <div class="value">
                            <input type="file" id="prof-upload" accept="*">
                        </div>
                    </button>
                    <button class="menu-btn" btn-action="prof-save">
                        <div class="display">
                            <span class="title" i18n="sidenav.upload.save"></span>
                        </div>
                    </button>
                </div>
                <div class="menu-category">
                    <button class="menu-btn" btn-action="lang">
                        <div class="display">
                            <span class="title" i18n="lang"></span>
                        </div>
                    </button>
                    <button class="menu-btn" btn-action="about">
                        <div class="display">
                            <span class="title" i18n="about"></span>
                        </div>
                    </button>
                </div>
            </div>
        </div>


        <div id="topbar">
            <div class="menu-category-container">
                <div class="menu-category">
                    <button class="menu-btn" btn-action="sidenav">
                        <div class="display">
                            <div class="img-container">
                                <img src="" class="icon">
                            </div>
                        </div>
                    </button>

                    <div class="menu-logo-container">
                        <div class="menu-logo">
                            <div class="img-container">
                                <img src="" class="icon">
                            </div>
                            <span class="title">bfprofeditor</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="menu-category-container" align="center">
                <div class="menu-category">
                    <button class="menu-btn" btn-action="tabchange" tabindex="0">
                        <div class="display">
                            <span class="text" i18n="6.tabs.color"></span>
                        </div>
                    </button>
                    <button class="menu-btn" btn-action="tabchange" tabindex="1">
                        <div class="display">
                            <span class="text">Second</span>
                        </div>
                    </button>
                </div>
            </div>

            <div class="menu-category-container" align="right">
                <div class="menu-category">
                    <button class="menu-btn" btn-action="lang">
                        <div class="display">
                            <div class="img-container">
                                <img src="" class="icon">
                            </div>
                        </div>
                    </button>
                    <button class="menu-btn" btn-action="about">
                        <div class="display">
                            <div class="img-container">
                                <img src="" class="icon">
                            </div>
                        </div>
                    </button>
                </div>
            </div>
        </div>


        <div id="content">
            <tab tabindex="0" active>
                <div id="tab-content">
                    <div class="menu-category">
                        <button class="menu-btn" type="toggle">
                            <div class="display">
                                <span class="text">Toggle Input</span>
                            </div>
                            <div class="value">
                                <span class="toggle-alt"></span>
                                <input type="checkbox">
                            </div>
                        </button>

                        <button class="menu-btn" type="range">
                            <div class="display">
                                <span class="text">Range Input</span>
                            </div>
                            <div class="value">
                                <input type="number">
                                <input type="range" max="100" min="0" value="63">
                            </div>
                        </button>

                        <button class="menu-btn" type="number">
                            <div class="display">
                                <span class="text">Number Input</span>
                            </div>
                            <div class="value">
                                <input type="number" max="100" min="0" value="32">
                                <div class="btn-group">
                                    <div class="up" data-action="inc"></div>
                                    <div class="dn" data-action="dec"></div>
                                </div>
                            </div>
                        </button>

                        <button class="menu-btn" type="color">
                            <div class="display">
                                <span class="text">Color Input</span>
                            </div>
                            <div class="value">
                                <input type="color">
                            </div>
                        </button>
                    </div>
                </div>
            </tab>

            <tab tabindex="1">
                <div id="tab-content">
                    <p>this is the second tab</p>
                </div>
            </tab>
        </div>


    </body>
</html>
